<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나만의 독서 우주</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

      body {
        font-family: 'Jua', sans-serif;
        background-color: #020617; /* slate-950 */
      }

      /* 행성 둥둥 떠다니는 애니메이션 */
      @keyframes float {
        0% { transform: translate(-50%, -50%) translateY(0); }
        50% { transform: translate(-50%, -50%) translateY(-8px); }
        100% { transform: translate(-50%, -50%) translateY(0); }
      }

      .planet-wrapper {
        position: absolute;
        transform: translate(-50%, -50%);
        transition: left 0.5s ease, top 0.5s ease;
      }

      .planet-float {
        animation: float 4s ease-in-out infinite;
      }

      /* 별똥별 애니메이션 */
      @keyframes shootingStar {
        0% { transform: translateX(0) translateY(0) rotate(-45deg) scale(1); opacity: 1; }
        100% { transform: translateX(-600px) translateY(600px) rotate(-45deg) scale(0); opacity: 0; }
      }

      .shooting-star {
        position: absolute;
        width: 100px;
        height: 2px;
        background: linear-gradient(to right, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
        border-radius: 999px;
        filter: drop-shadow(0 0 5px rgba(255, 255, 255, 1));
      }

      /* 행성 생성 팝 애니메이션 */
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      .animate-pop-in {
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* 진행도 줄무늬 애니메이션 */
      @keyframes stripe { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
      .progress-stripe {
        background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent);
        background-size: 40px 40px;
        animation: stripe 1s linear infinite;
      }

      /* 커스텀 스크롤바 */
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK 로드 -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      // React 코드(Babel)에서 Firebase 모듈을 사용할 수 있도록 전역 객체에 연결
      window.FirebaseEnv = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserLocalPersistence, getFirestore, collection, onSnapshot, addDoc, serverTimestamp };
    </script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState, useCallback } = React;

      // 15단계 우주선 랭크 데이터
      const RANKS = [
        { level: 1, title: '종이 비행기', minLy: 0, maxLy: 300, icon: 'paperclip' },
        { level: 2, title: '열기구 탐사선', minLy: 301, maxLy: 800, icon: 'sun' },
        { level: 3, title: '소형 드론', minLy: 801, maxLy: 1500, icon: 'drone' },
        { level: 4, title: '스푸트니크', minLy: 1501, maxLy: 2500, icon: 'satellite' },
        { level: 5, title: '알 우주선', minLy: 2501, maxLy: 4000, icon: 'moon' },
        { level: 6, title: '꼬마 로켓', minLy: 4001, maxLy: 6000, icon: 'rocket' },
        { level: 7, title: '궤도 기지', minLy: 6001, maxLy: 8500, icon: 'shuttle' },
        { level: 8, title: '달 탐사 로버', minLy: 8501, maxLy: 11500, icon: 'rover' },
        { level: 9, title: '심우주 탐사선', minLy: 11501, maxLy: 15000, icon: 'probe' },
        { level: 10, title: '이온 추진선', minLy: 15001, maxLy: 20000, icon: 'ion' },
        { level: 11, title: '태양 돛단배', minLy: 20001, maxLy: 26000, icon: 'sail' },
        { level: 12, title: '소행성 채굴선', minLy: 26001, maxLy: 33000, icon: 'miner' },
        { level: 13, title: '성간 순양함', minLy: 33001, maxLy: 42000, icon: 'cruiser' },
        { level: 14, title: '차원 도약함', minLy: 42001, maxLy: 55000, icon: 'warp' },
        { level: 15, title: '우주 정복자', minLy: 55001, maxLy: Number.POSITIVE_INFINITY, icon: 'trophy' },
      ];

      const iconPaths = {
        book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></>,
        star: <polygon points="12 2 15.1 8.3 22 9.3 17 14.2 18.2 21 12 17.8 5.8 21 7 14.2 2 9.3 8.9 8.3 12 2" />,
        plus: <><path d="M12 5v14" /><path d="M5 12h14" /></>,
        x: <><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>,
        moon: <path d="M12 3a6.7 6.7 0 0 0 8.7 8.7A8.6 8.6 0 1 1 12 3z" />,
        rocket: <><path d="M4.5 16.5c-1.2 1-1.5 3.5-1.5 3.5s2.5-.3 3.5-1.5c.6-.7.6-1.7 0-2.3-.6-.6-1.6-.6-2 .3z"/><path d="M9 15 5 11l3-3c3-3 7-4 11-4 0 4-1 8-4 11l-3 3-3-3z"/><path d="M9 15c0 1.5-1.5 3-3 3"/><path d="M15 9h.01"/></>,
        trophy: <><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v6a5 5 0 0 1-10 0V4z"/><path d="M5 6H3v2a4 4 0 0 0 4 4"/><path d="M19 6h2v2a4 4 0 0 1-4 4"/></>,
        sun: <><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></>,
        paperclip: <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>,
        drone: <><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M22 12h-4"/><path d="M6 12H2"/><path d="M12 2v4"/><path d="M12 22v-4"/></>,
        satellite: <><path d="M13 7 9 11"/><path d="m17 11-4 4"/><path d="m13 19-8-8"/><path d="m21 11-8-8"/><path d="M3 21l3-3"/></>,
        shuttle: <path d="M13 2 3 14l9 9 10-12Z" />,
        rover: <><circle cx="6" cy="16" r="3"/><circle cx="18" cy="16" r="3"/><path d="M3 16h18M6 16v-4h12v4M12 12V6M9 6h6"/></>,
        probe: <><circle cx="12" cy="12" r="4"/><path d="M12 2v6M12 16v6M2 12h6M16 12h6"/></>,
        ion: <><path d="M12 2v20M8 6h8M6 12h12M8 18h8"/></>,
        sail: <><path d="M22 12H2M12 2L2 12l10 10 10-10Z"/></>,
        miner: <><path d="m12 14 4-4M16 10l-4-4-4 4 4 4ZM2 22l6-6M22 22l-6-6"/></>,
        cruiser: <><path d="M4 12h16M4 12l8-8 8 8-8 8-8-8Z"/></>,
        warp: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2v20M2 12h20"/></>
      };

      function Icon({ name, size = 24, className = '', filled = false }) {
        return (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" 
               fill={filled ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2" 
               strokeLinecap="round" strokeLinejoin="round" className={className}>
            {iconPaths[name] || iconPaths['star']}
          </svg>
        );
      }

      function getPlanetDefinition(index) {
        // 처음 9개는 고정된 태양계 + 명왕성 행성들
        const SOLARS = [
          { name: '수성', baseColor: '#cbd5e1', decorColor: '#94a3b8', desc: '태양과 가장 가까운 작고 빠른 행성입니다.' },
          { name: '금성', baseColor: '#fde047', decorColor: '#facc15', desc: '두꺼운 구름 이불을 덮고 있는 아주 뜨겁고 밝은 행성입니다.' },
          { name: '지구', baseColor: '#93c5fd', decorColor: '#86efac', desc: '푸른 바다와 생명이 숨쉬는 우리가 살고 있는 곳입니다.' },
          { name: '화성', baseColor: '#fca5a5', decorColor: '#f87171', desc: '붉은 모래로 덮여 볼이 빨간 매력적인 행성입니다.' },
          { name: '목성', baseColor: '#fcd34d', decorColor: '#fbbf24', desc: '태양계에서 가장 덩치가 크고 가스로 이루어진 행성입니다.' },
          { name: '토성', baseColor: '#fef08a', decorColor: '#eab308', desc: '아름다운 고리를 훌라후프처럼 두른 멋쟁이 행성입니다.' },
          { name: '천왕성', baseColor: '#a5f3fc', decorColor: '#67e8f9', desc: '옆으로 누워서 데굴데굴 구르는 엉뚱한 하늘색 얼음 행성입니다.' },
          { name: '해왕성', baseColor: '#60a5fa', decorColor: '#3b82f6', desc: '다이아몬드 비가 내리는 새파란 바다색 폭풍 행성입니다.' },
          { name: '명왕성', baseColor: '#e2e8f0', decorColor: '#f8fafc', desc: '가슴에 커다란 하트를 품고 있는 작고 귀여운 친구입니다.' }
        ];

        if (index < SOLARS.length) return SOLARS[index];

        // 10번째부터는 무한히 생성되는 나만의 외계 심우주 행성 (파스텔톤)
        const hue1 = (index * 137.5) % 360; 
        const hue2 = (hue1 + 60) % 360;
        
        return {
          name: `외계 행성 X-${index + 1}`,
          baseColor: `hsl(${hue1}, 85%, 75%)`,
          decorColor: `hsl(${hue2}, 85%, 70%)`,
          desc: '아직 인류가 닿지 못한 미지의 심우주에서 반짝이는 신비한 외계 행성입니다.'
        };
      }

      function CutePlanet({ def, size }) {
        return (
          <div className="relative" style={{ width: size, height: size }}>
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-xl overflow-visible">
              {/* 행성 몸통 (부드러운 평면 컬러) */}
              <circle cx="50" cy="50" r="48" fill={def.baseColor} />
              
              {/* 데코레이션 (얼룩 무늬) */}
              <path d="M 10 30 Q 30 10 50 10 Q 20 30 10 50 Z" fill={def.decorColor} opacity="0.6" />
              <path d="M 90 70 Q 70 90 50 90 Q 80 70 90 50 Z" fill={def.decorColor} opacity="0.6" />
              <path d="M 85 20 Q 95 40 85 60 Q 65 40 85 20 Z" fill={def.decorColor} opacity="0.4" />
              
              {/* 귀여운 스마일 얼굴 (까만 눈과 입) */}
              <g>
                {/* 눈 */}
                <circle cx="35" cy="45" r="5" fill="#1e293b" />
                <circle cx="65" cy="45" r="5" fill="#1e293b" />
                {/* 웃는 입 */}
                <path d="M 40 55 Q 50 65 60 55" fill="none" stroke="#1e293b" strokeWidth="4" strokeLinecap="round" />
                {/* 발그레한 볼터치 */}
                <circle cx="20" cy="52" r="6" fill="#ff8da1" opacity="0.5" />
                <circle cx="80" cy="52" r="6" fill="#ff8da1" opacity="0.5" />
              </g>

              {/* 반짝이는 3D 하이라이트 (유리구슬 코팅 느낌) */}
              <path d="M 15 25 Q 30 5 60 10 Q 30 15 15 25 Z" fill="#ffffff" opacity="0.4" />
            </svg>
          </div>
        );
      }

      // 새 행성이 들어갈 때 기존 행성들과 겹치지 않는 위치를 찾아내는 마법의 알고리즘
      function findNonOverlappingPosition(existingBooks, newSize) {
        let attempt = 0;
        let x = 50, y = 50;
        let hasCollision = true;
        
        // 캔버스 가로를 대략 800px로 가정하고 %를 픽셀 단위로 환산해서 거리 계산
        const canvasW = 800; 
        const canvasH = 500;
        const newRadius = newSize / 2;

        while (hasCollision && attempt < 500) {
            // 아르키메데스 나선 (중앙에서 시작해 빙글빙글 돌며 퍼져나감)
            const angle = attempt * 0.6; 
            const radius = 5 + (attempt * 1.5); 
            
            // X, Y % 위치 계산 (화면 비율 보정)
            x = 50 + (Math.cos(angle) * radius);
            y = 50 + (Math.sin(angle) * radius) * (canvasW / canvasH);

            // 화면 밖으로 나가지 않도록 여백 설정 (10% ~ 90%)
            x = Math.max(8, Math.min(92, x));
            y = Math.max(12, Math.min(88, y));

            hasCollision = false;
            
            // 기존에 배치된 모든 행성들과 거리를 비교!
            for (const book of existingBooks) {
                const bookRadius = book.size / 2;
                
                // % 좌표를 실제 픽셀 비율로 변경하여 정확한 거리 계산
                const pxX = (x / 100) * canvasW;
                const pxY = (y / 100) * canvasH;
                const bPxX = (book.x / 100) * canvasW;
                const bPxY = (book.y / 100) * canvasH;

                const dist = Math.hypot(pxX - bPxX, pxY - bPxY);

                // 두 행성의 반지름 합 + 15px(여백) 보다 가까우면 충돌(겹침)로 판정!
                if (dist < (newRadius + bookRadius + 15)) {
                    hasCollision = true;
                    break; 
                }
            }
            attempt++; // 충돌했으면 다음 나선 위치로 이동해서 다시 검사
        }
        
        return { x, y };
      }

      function App() {
        const [books, setBooks] = useState([]);
        const [isLoaded, setIsLoaded] = useState(false);
        const [userContext, setUserContext] = useState(null);
        
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [isLoading, setIsLoading] = useState(false);
        const [selectedBookId, setSelectedBookId] = useState(null);
        const [newBook, setNewBook] = useState({ title: '', pages: '', rating: 5, review: '' });

        // 1. Firebase 접속 및 개인 식별 설정 (여러 명 접속 시 데이터 분리 핵심!)
        useEffect(() => {
          // Firebase 환경이 로드되지 않았을 경우 (에러 방지)
          if (typeof window.FirebaseEnv === 'undefined' || typeof __firebase_config === 'undefined') {
            setIsLoaded(true);
            return;
          }

          try {
            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserLocalPersistence, getFirestore } = window.FirebaseEnv;
            const config = JSON.parse(__firebase_config);
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'book-universe';

            // 익명 로그인으로 각 브라우저마다 고유한 아이디(UID)를 발급받음
            const initAuth = async () => {
              try {
                // 핵심 수정: 브라우저를 껐다 켜도 세션(익명 고유 ID)이 날아가지 않도록 '로컬 저장' 강제 설정!
                await setPersistence(auth, browserLocalPersistence);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (e) { console.error("인증 실패:", e); }
            };
            initAuth();

            // 유저 아이디가 발급되면 상태에 저장
            const unsub = onAuthStateChanged(auth, (user) => {
              if (user) setUserContext({ uid: user.uid, db, appId });
            });
            return () => unsub();
          } catch (e) {
            console.error("Firebase 초기화 에러:", e);
            setIsLoaded(true);
          }
        }, []);

        // 2. 내 고유 아이디(UID)에 해당하는 데이터만 실시간으로 불러오기!
        useEffect(() => {
          if (!userContext) return;
          const { collection, onSnapshot } = window.FirebaseEnv;
          
          // 경로: artifacts / 앱이름 / users / 내아이디 / books (완벽한 개인 분리!)
          const booksRef = collection(userContext.db, 'artifacts', userContext.appId, 'users', userContext.uid, 'books');

          const unsub = onSnapshot(booksRef, (snap) => {
            const loaded = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // 저장된 시간 순서대로 정렬 (먼저 기록한게 먼저 그려지도록)
            loaded.sort((a, b) => {
              const timeA = a.createdAt ? a.createdAt.toMillis() : (a.localTime || 0);
              const timeB = b.createdAt ? b.createdAt.toMillis() : (b.localTime || 0);
              return timeA - timeB;
            });
            setBooks(loaded);
            setIsLoaded(true);
          }, (error) => {
            console.error("데이터 로드 에러:", error);
            setIsLoaded(true);
          });
          return () => unsub();
        }, [userContext]);

        // 진행도 계산 로직
        const totalLy = useMemo(() => books.reduce((sum, book) => sum + book.pages, 0), [books]);
        
        const getRankIndex = (ly) => {
          const idx = RANKS.findIndex(r => ly >= r.minLy && ly <= r.maxLy);
          return idx === -1 ? RANKS.length - 1 : idx;
        };

        const currentIndex = getRankIndex(totalLy);
        const currentRank = RANKS[currentIndex];
        const prevRank = currentIndex > 0 ? RANKS[currentIndex - 1] : null;
        const nextRank = currentIndex < RANKS.length - 1 ? RANKS[currentIndex + 1] : null;
        const remainingLy = nextRank ? Math.max(0, nextRank.minLy - totalLy) : 0;
        const progressPercent = nextRank ? Math.min(100, Math.max(0, ((totalLy - currentRank.minLy) / (nextRank.minLy - currentRank.minLy)) * 100)) : 100;
        
        const selectedBook = books.find((book) => book.id === selectedBookId) ?? books[books.length - 1] ?? null;

        // 배경 요소
        const backgroundStars = useMemo(() => Array.from({ length: 40 }).map((_, i) => ({
          id: i, x: Math.random() * 100, y: Math.random() * 100, size: Math.random() * 3 + 1,
          opacity: Math.random() * 0.5 + 0.1, animDelay: `${Math.random() * 3}s`,
        })), []);
        
        const shootingStars = useMemo(() => Array.from({ length: 3 }).map((_, i) => ({
          id: i, top: Math.random() * 40, left: Math.random() * 60 + 40,
          delay: Math.random() * 15 + i * 2, duration: Math.random() * 1.5 + 2,
        })), []);

        const handleAddBook = async (event) => {
          event.preventDefault();
          const pagesNum = Number(newBook.pages);
          if (!newBook.title.trim() || !Number.isFinite(pagesNum) || pagesNum < 1) return;

          setIsLoading(true);
          
          const safePages = Math.floor(pagesNum);
          const size = Math.max(60, Math.min(130, 45 + safePages / 10)); // 책 두께에 따른 행성 크기 제한
          
          // 겹침 방지 알고리즘을 사용해 빈 공간 찾기!
          const position = findNonOverlappingPosition(books, size);
          
          const planetIndex = books.length;
          const planetDef = getPlanetDefinition(planetIndex);
          
          const addedBook = {
            title: newBook.title.trim(), 
            pages: safePages, 
            rating: newBook.rating, 
            review: newBook.review.trim(),
            x: position.x, 
            y: position.y, 
            size: size,
            planetName: planetDef.name,
            baseColor: planetDef.baseColor,
            decorColor: planetDef.decorColor,
            desc: planetDef.desc
          };

          if (userContext) {
            // Firebase에 내 개인 데이터로 안전하게 기록
            const { collection, addDoc, serverTimestamp } = window.FirebaseEnv;
            const booksRef = collection(userContext.db, 'artifacts', userContext.appId, 'users', userContext.uid, 'books');
            await addDoc(booksRef, { ...addedBook, createdAt: serverTimestamp(), localTime: Date.now() });
          } else {
            // Firebase 연결 안될 시 임시 처리 (화면 렌더링용)
            setBooks(prev => [...prev, { id: Date.now().toString(), ...addedBook }]);
          }

          setIsLoading(false);
          setNewBook({ title: '', pages: '', rating: 5, review: '' });
          setIsModalOpen(false);
        };

        if (!isLoaded) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-white text-2xl animate-pulse">우주를 그리는 중... 🚀</div>;

        return (
          <div className="min-h-screen bg-slate-950 text-slate-300 selection:bg-indigo-500/30 pb-24 md:pb-12 overflow-x-hidden relative">
            {/* 상단 헤더 */}
            <header className="border-b border-slate-800/60 bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
              <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-end">
                <div>
                  <h1 className="text-2xl sm:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400 mb-1 flex items-center gap-2">
                    <Icon name="rocket" size={28} className="text-indigo-400 shrink-0" />
                    나만의 독서 우주
                  </h1>
                  <p className="text-slate-400 text-sm hidden sm:block">책을 읽을수록 나만의 우주가 넓어집니다!</p>
                </div>
                <div className="text-right">
                  <span className="text-xs text-slate-500 block">총 비행 거리</span>
                  <span className="text-xl font-bold text-indigo-300">{totalLy.toLocaleString()} <span className="text-sm">광년</span></span>
                </div>
              </div>
            </header>

            <main>
              {/* 15단계 우주선 랭크 대시보드 */}
              <section className="max-w-5xl mx-auto px-4 sm:px-6 py-6 relative z-10">
                <div className="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-4 sm:p-6 shadow-2xl flex flex-col items-center">
                  <h2 className="text-slate-300 text-lg mb-6 flex items-center gap-2">
                    <Icon name="star" filled size={18} className="text-yellow-400" />
                    우주선 진화 (Level {currentRank.level}/15)
                    <Icon name="star" filled size={18} className="text-yellow-400" />
                  </h2>

                  <div className="grid grid-cols-[72px_minmax(100px,1fr)_72px] sm:grid-cols-[96px_1fr_120px_1.5fr_96px] items-center justify-between w-full gap-2 sm:gap-4">
                    {/* 이전 단계 */}
                    <div className="flex flex-col items-center">
                      {prevRank ? (
                        <>
                          <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mb-2 opacity-50">
                            <Icon name={prevRank.icon} size={20} className="text-slate-500" />
                          </div>
                          <span className="text-xs text-slate-500 text-center leading-tight">{prevRank.title}</span>
                        </>
                      ) : <div className="w-12 h-12" />}
                    </div>

                    <div className="h-1 bg-slate-800 rounded-full relative hidden sm:block">
                      {prevRank && <div className="absolute inset-0 bg-indigo-500/30 rounded-full" />}
                    </div>

                    {/* 현재 단계 */}
                    <div className="flex flex-col items-center relative group shrink-0">
                      <div className="absolute top-0 w-16 h-16 sm:w-20 sm:h-20 bg-indigo-500 rounded-full blur-xl opacity-40 animate-pulse" />
                      <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center relative z-10 border-4 border-slate-900 shadow-xl group-hover:scale-105 transition-transform">
                        <Icon name={currentRank.icon} size={32} className="text-white drop-shadow-md" />
                      </div>
                      <div className="mt-3 text-center">
                        <span className="text-base sm:text-lg font-bold text-white block leading-tight">{currentRank.title}</span>
                      </div>
                    </div>

                    {/* 다음 단계 진행바 */}
                    {nextRank ? (
                      <div className="col-span-3 sm:col-span-1 mt-4 sm:mt-0 flex flex-col justify-center relative w-full">
                        <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                          <div className="h-full bg-gradient-to-r from-indigo-500 to-pink-500 progress-stripe transition-all duration-1000" style={{ width: `${progressPercent}%` }} />
                        </div>
                        <div className="mt-2 self-center bg-indigo-500/20 text-indigo-200 border border-indigo-500/30 px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap shadow-lg">
                          다음 진화까지 {remainingLy.toLocaleString()} 광년!
                        </div>
                      </div>
                    ) : <div className="hidden sm:block" />}

                    {/* 다음 단계 */}
                    <div className="flex flex-col items-center">
                      {nextRank ? (
                        <>
                          <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-slate-800 border-2 border-dashed border-slate-600 flex items-center justify-center mb-2">
                            <Icon name={nextRank.icon} size={24} className="text-slate-500" />
                          </div>
                          <span className="text-xs text-slate-400 text-center leading-tight">{nextRank.title}</span>
                        </>
                      ) : (
                        <>
                          <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl bg-gradient-to-tr from-yellow-400 to-orange-500 flex items-center justify-center mb-2 shadow-[0_0_15px_rgba(250,204,21,0.5)]">
                            <Icon name="trophy" size={24} className="text-white animate-pulse" />
                          </div>
                          <span className="text-xs text-yellow-400 font-bold text-center leading-tight">우주 정복!</span>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              </section>

              <section className="max-w-5xl mx-auto px-4 sm:px-6 grid lg:grid-cols-[minmax(0,1fr)_320px] gap-4 sm:gap-6">
                
                {/* 캔버스 (행성들이 둥둥 떠있는 우주 공간) */}
                <div className="relative w-full h-[450px] sm:h-[550px] bg-slate-900 border border-slate-800/80 rounded-2xl sm:rounded-3xl overflow-hidden shadow-2xl">
                  {/* 배경 별들 */}
                  {backgroundStars.map((star) => (
                    <div key={`star-${star.id}`} className="absolute rounded-full bg-white animate-pulse" style={{ left: `${star.x}%`, top: `${star.y}%`, width: `${star.size}px`, height: `${star.size}px`, opacity: star.opacity, animationDelay: star.animDelay, animationDuration: '3s' }} />
                  ))}
                  {/* 별똥별 */}
                  {shootingStars.map((star) => (
                    <div key={`shoot-${star.id}`} className="shooting-star" style={{ top: `${star.top}%`, left: `${star.left}%`, animation: `shootingStar ${star.duration}s linear infinite`, animationDelay: `${star.delay}s` }} />
                  ))}

                  {/* 궤도선 (행성 간 연결) */}
                  {books.length > 1 && (
                    <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-20" viewBox="0 0 100 100" preserveAspectRatio="none">
                      {books.map((book, i) => {
                        if (i === 0) return null;
                        const prev = books[i - 1];
                        const cx = (prev.x + book.x) / 2 + (Math.sin(i)*5);
                        const cy = (prev.y + book.y) / 2 - (Math.cos(i)*5);
                        return <path key={`line-${book.id}`} d={`M ${prev.x} ${prev.y} Q ${cx} ${cy} ${book.x} ${book.y}`} fill="none" stroke="white" strokeWidth="0.3" strokeDasharray="1 1" />;
                      })}
                    </svg>
                  )}

                  {/* 책(행성) 렌더링 */}
                  {books.map((book, index) => {
                    const isSelected = selectedBook?.id === book.id;
                    
                    return (
                      <div key={`book-${book.id}`} className="planet-wrapper animate-pop-in" style={{ left: `${book.x}%`, top: `${book.y}%`, zIndex: isSelected ? 20 : 10 }}>
                        <div className="planet-float flex flex-col items-center" style={{ animationDelay: `${(index % 5) * 0.4}s` }}>
                          
                          <button onClick={() => setSelectedBookId(book.id)} className="group focus:outline-none focus:ring-4 ring-indigo-500/50 rounded-full transition-transform hover:scale-110 flex flex-col items-center">
                            {/* 귀여운 스마일 행성 그래픽 */}
                            <div className={`transition-all duration-300 ${isSelected ? 'scale-110' : ''}`}>
                               <CutePlanet def={book} size={book.size} />
                            </div>
                            
                            {/* 라벨 (행성 이름 + 책 제목 콤보!) */}
                            <div className={`mt-2 px-3 py-1.5 flex flex-col items-center bg-slate-900/90 backdrop-blur-md border rounded-xl transition-colors shadow-lg ${isSelected ? 'border-pink-400' : 'border-slate-700 group-hover:border-slate-500'}`}>
                              <span className="text-[11px] text-pink-300 font-bold leading-none mb-1">{book.planetName}</span>
                              <span className={`text-xs max-w-[100px] truncate leading-none ${isSelected ? 'text-white' : 'text-slate-300 group-hover:text-white'}`}>
                                {book.title}
                              </span>
                            </div>
                          </button>

                        </div>
                      </div>
                    );
                  })}
                  {books.length === 0 && (
                     <div className="absolute inset-0 flex items-center justify-center text-slate-500">
                       <p>우측 하단의 ➕ 버튼을 눌러 나만의 우주를 넓혀보세요!</p>
                     </div>
                  )}
                </div>

                {/* 우측 정보 패널 */}
                <aside className="bg-slate-900/70 border border-slate-800 rounded-2xl p-5 min-h-[300px] shadow-xl flex flex-col">
                  {selectedBook ? (
                    <div className="flex-1 flex flex-col animate-pop-in">
                      <div className="mb-4 flex justify-center">
                        <CutePlanet def={selectedBook} size={80} />
                      </div>
                      <div className="text-center mb-4">
                        <span className="px-3 py-1.5 bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 rounded-lg text-sm font-bold shadow-md">{selectedBook.planetName}</span>
                      </div>
                      
                      <h2 className="text-white text-xl font-bold leading-tight break-words">{selectedBook.title}</h2>
                      <p className="text-sm text-pink-300 mt-1">{selectedBook.pages.toLocaleString()} 광년 (페이지)</p>
                      
                      <div className="flex mt-2 gap-1">
                        {[...Array(5)].map((_, i) => (
                          <Icon key={i} name="star" size={18} filled={i < selectedBook.rating} className={i < selectedBook.rating ? 'text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.8)]' : 'text-slate-600'} />
                        ))}
                      </div>

                      <div className="mt-4 flex-1">
                        {selectedBook.review ? (
                          <p className="text-sm text-slate-300 bg-slate-950/60 border border-slate-800 p-3 rounded-xl leading-relaxed">"{selectedBook.review}"</p>
                        ) : (
                          <p className="text-sm text-slate-500 italic">감상평이 없습니다.</p>
                        )}
                      </div>
                      
                      <div className="mt-4 p-3 bg-indigo-900/30 border border-indigo-500/30 rounded-xl">
                        <p className="text-xs text-indigo-200 flex items-start gap-2">
                          <span className="text-lg leading-none">💡</span>
                          {selectedBook.desc}
                        </p>
                      </div>
                    </div>
                  ) : (
                    <div className="h-full flex flex-col justify-center items-center text-center text-slate-500">
                      <Icon name="book" size={32} className="mb-3 text-slate-600" />
                      <p>행성을 클릭하면 책과<br/>귀여운 행성 정보가 보여요.</p>
                    </div>
                  )}
                </aside>
              </section>
            </main>

            {/* 등록 버튼 */}
            <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 bg-gradient-to-r from-indigo-500 to-pink-500 text-white p-5 rounded-full shadow-[0_0_20px_rgba(236,72,153,0.5)] hover:scale-110 hover:shadow-[0_0_30px_rgba(236,72,153,0.8)] transition-all z-40">
              <Icon name="plus" size={32} />
            </button>

            {/* 깔끔한 책 등록 폼 모달 */}
            {isModalOpen && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4" onMouseDown={() => setIsModalOpen(false)}>
                <div className="bg-slate-900 border border-slate-700 w-full max-w-md rounded-2xl overflow-visible shadow-2xl animate-pop-in" onMouseDown={(e) => e.stopPropagation()}>
                  
                  <div className="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700 rounded-t-2xl">
                    <h2 className="text-xl font-bold text-white flex items-center gap-2">
                      <Icon name="book" size={24} className="text-pink-400" />새로운 행성 기록
                    </h2>
                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-white transition-colors">
                      <Icon name="x" size={24} />
                    </button>
                  </div>

                  <form onSubmit={handleAddBook} className="p-6 space-y-5">
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">다 읽은 책 제목</label>
                      <input
                        required autoFocus
                        type="text"
                        value={newBook.title}
                        onChange={(e) => setNewBook({...newBook, title: e.target.value})}
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                        placeholder="예: 돈키호테"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">총 페이지 수 (광년 거리)</label>
                      <input 
                        required 
                        type="number" min="1" 
                        value={newBook.pages} 
                        onChange={(e) => setNewBook({...newBook, pages: e.target.value})} 
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all" 
                        placeholder="예: 350" 
                      />
                      <p className="text-xs text-slate-500 mt-1 mt-1">* 페이지 수가 높을수록 더 큰 행성이 탄생합니다.</p>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-2">책 별점</label>
                      <div className="flex gap-2">
                        {[1, 2, 3, 4, 5].map((star) => (
                          <button key={star} type="button" onClick={() => setNewBook({...newBook, rating: star})} className="focus:outline-none hover:scale-110 transition-transform">
                            <Icon name="star" size={32} filled={star <= newBook.rating} className={star <= newBook.rating ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)]' : 'text-slate-700'} />
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">기억에 남는 감상평 (선택)</label>
                      <textarea 
                        value={newBook.review} 
                        onChange={(e) => setNewBook({...newBook, review: e.target.value})} 
                        className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none transition-all" 
                        rows="2" 
                        placeholder="나만의 짤막한 우주 기록을 남겨보세요." 
                      />
                    </div>

                    <button type="submit" disabled={isLoading} className="w-full bg-gradient-to-r from-indigo-500 to-pink-500 text-white font-bold py-4 rounded-xl mt-2 hover:shadow-[0_0_20px_rgba(236,72,153,0.5)] transition-all disabled:opacity-50">
                      {isLoading ? '우주로 기록 전송 중... 🚀' : '행성 띄우기'}
                    </button>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
