<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나만의 독서 우주</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

      .font-cute {
        font-family: 'Jua', sans-serif;
      }

      /* 떠다니는 애니메이션 */
      @keyframes float {
        0% { transform: translate(-50%, -50%) translateY(0); }
        50% { transform: translate(-50%, -50%) translateY(-12px); }
        100% { transform: translate(-50%, -50%) translateY(0); }
      }
      .planet-float {
        animation: float 4s ease-in-out infinite;
        position: absolute;
        transform: translate(-50%, -50%);
      }

      /* 별똥별 애니메이션 */
      @keyframes shootingStar {
        0% { transform: translateX(0) translateY(0) rotate(-45deg) scale(1); opacity: 1; }
        100% { transform: translateX(-800px) translateY(800px) rotate(-45deg) scale(0); opacity: 0; }
      }
      .shooting-star {
        position: absolute;
        width: 120px;
        height: 3px;
        background: linear-gradient(to right, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
        border-radius: 999px;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 1));
      }

      /* 행성 스테이지 (그림자 및 발광 효과) */
      .planet-stage {
        position: relative;
        display: inline-grid;
        place-items: center;
        width: var(--planet-size);
        height: var(--planet-size);
        filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 20px var(--planet-glow));
        transition: filter 300ms ease, transform 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .planet-selected {
        filter: drop-shadow(0 20px 35px rgba(0, 0, 0, 0.7)) drop-shadow(0 0 40px var(--planet-glow));
        transform: scale(1.15);
        z-index: 30 !important;
      }

      /* ★ 영롱한 3D 크리스탈 행성 본체 ★ */
      .planet-body {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: var(--planet-bg);
        background-size: var(--planet-bg-size, auto);
        /* 강력하고 부드러운 입체 유리구슬 효과 */
        box-shadow: 
          inset -15px -15px 30px rgba(0, 0, 0, 0.7), /* 어두운 뒷면 */
          inset 10px 10px 20px rgba(255, 255, 255, 0.6), /* 밝은 하이라이트 */
          inset 0 0 15px rgba(255, 255, 255, 0.3); /* 은은한 테두리 빛 */
        overflow: hidden;
      }

      /* 행성 띠 (줄무늬가 있는 경우) */
      .planet-stripes {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: repeating-linear-gradient(
          calc(0deg + var(--planet-tilt, 0deg)),
          rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.1) 10%,
          rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 20%
        );
        mix-blend-mode: overlay;
        opacity: var(--planet-stripes-opacity, 0);
      }

      /* 영롱한 고리 */
      .planet-ring {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 160%;
        height: 45%;
        border: var(--planet-ring-width) solid var(--planet-ring-color);
        border-left-color: transparent;
        border-right-color: transparent;
        border-radius: 999px;
        pointer-events: none;
        transform: translate(-50%, -50%) rotate(calc(var(--planet-tilt) - 15deg));
        box-shadow: 
          0 0 15px var(--planet-ring-color),
          inset 0 0 10px var(--planet-ring-color);
      }
      .planet-ring-back { z-index: 1; opacity: 0.4; }
      .planet-ring-front { z-index: 3; clip-path: inset(50% 0 0 0); opacity: 0.9; }

      /* 생성 팝 애니메이션 */
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-pop-in {
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .progress-stripe {
        background-image: linear-gradient(
          45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 50%,
          rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%, transparent 75%, transparent
        );
        background-size: 40px 40px;
        animation: stripe 1s linear infinite;
      }
      @keyframes stripe { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
    </style>
  </head>
  <body class="bg-slate-950">

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      // =========================================================================
      // 🚨 구글 앱스 스크립트 웹 앱 URL을 아래에 붙여넣으세요! (따옴표 안에)
      // =========================================================================
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKfQuMBDXAiF0hwuXuYJ88YtbSH3LvVXh9eOMGmitiIcuiNzouJf7TeuNAe1ttFYfo/exec'; 
      
      const STORAGE_KEY = 'reading-universe-books';
      const CANVAS_MODEL = { width: 760, height: 500 };

      // ★ 심미적이고 감성적인 추상 텍스처로 새롭게 정의된 행성들 ★
      const PLANET_THEMES = [
        { id: 'mercury', name: '수성', desc: '태양과 가장 가까운 은빛 행성. 낮과 밤의 온도 차이가 극심하죠.', bg: 'radial-gradient(circle at 30% 30%, #d1d5db, #6b7280 60%, #374151)', glow: 'rgba(156, 163, 175, 0.4)', hasRing: false },
        { id: 'venus', name: '금성', desc: '두꺼운 황금빛 대기로 덮인, 밤하늘에서 가장 밝게 빛나는 아름다운 행성입니다.', bg: 'radial-gradient(circle at 40% 40%, #fde047, #f59e0b 50%, #92400e)', glow: 'rgba(251, 191, 36, 0.5)', hasRing: false },
        { id: 'earth', name: '지구', desc: '푸른빛의 생명력이 넘치는 우리의 고향. 맑은 바다와 부드러운 구름이 소용돌이칩니다.', bg: 'radial-gradient(circle at 30% 60%, rgba(74, 222, 128, 0.5) 0%, transparent 40%), radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 50%), linear-gradient(135deg, #60a5fa, #2563eb, #1e3a8a)', glow: 'rgba(59, 130, 246, 0.6)', hasRing: false },
        { id: 'mars', name: '화성', desc: '붉은 장미빛을 띠는 매혹적인 사막 행성. 짙은 산화철과 모래 폭풍의 색감입니다.', bg: 'radial-gradient(circle at 50% 20%, rgba(252, 165, 165, 0.6) 0%, transparent 40%), linear-gradient(145deg, #ef4444, #b91c1c, #450a0a)', glow: 'rgba(239, 68, 68, 0.5)', hasRing: false },
        { id: 'jupiter', name: '목성', desc: '태양계의 거인. 부드러운 밀크티 색상의 가스 폭풍이 끊임없이 휘몰아칩니다.', bg: 'linear-gradient(0deg, #b45309, #d97706, #fde68a, #d97706, #78350f)', bgSize: '100% 200%', stripesOpacity: 0.6, glow: 'rgba(217, 119, 6, 0.5)', hasRing: false },
        { id: 'saturn', name: '토성', desc: '우주의 보석. 은은한 황금빛 구체 주위로 눈부시게 아름다운 얼음 고리를 두르고 있습니다.', bg: 'linear-gradient(20deg, #92400e, #d97706, #fef3c7, #b45309)', stripesOpacity: 0.4, glow: 'rgba(253, 230, 138, 0.5)', ringColor: 'rgba(253, 230, 138, 0.7)', hasRing: true },
        { id: 'uranus', name: '천왕성', desc: '옆으로 누워 도는 신비로운 얼음 행성. 영롱한 에메랄드빛과 옅은 고리를 가졌습니다.', bg: 'radial-gradient(circle at 60% 40%, #a7f3d0, #34d399 50%, #064e3b)', glow: 'rgba(52, 211, 153, 0.6)', ringColor: 'rgba(167, 243, 208, 0.3)', hasRing: true },
        { id: 'neptune', name: '해왕성', desc: '태양계 가장 끝자락에 위치한 깊고 푸른 바다 빛깔의 폭풍 행성입니다.', bg: 'radial-gradient(circle at 30% 70%, rgba(147, 197, 253, 0.4) 0%, transparent 40%), linear-gradient(120deg, #3b82f6, #1d4ed8, #1e3a8a)', stripesOpacity: 0.3, glow: 'rgba(29, 78, 216, 0.6)', hasRing: false },
        { id: 'pluto', name: '명왕성', desc: '얼음과 바위로 덮인 아득한 외곽의 왜소행성. 표면에 밝은 하트 모양의 빛이 감돕니다.', bg: 'radial-gradient(circle at 70% 30%, rgba(254, 240, 138, 0.5) 0%, transparent 35%), linear-gradient(135deg, #d6d3d1, #a8a29e, #57534e)', glow: 'rgba(168, 162, 158, 0.4)', hasRing: false },
      ];

      const iconPaths = {
        book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></>,
        moon: <path d="M12 3a6.7 6.7 0 0 0 8.7 8.7A8.6 8.6 0 1 1 12 3z"/>,
        plane: <><path d="M17.8 19.2 16 11l6-6-17 7 7 2 2 7 3.8-1.8z"/><path d="m12 14 4-3"/></>,
        plus: <><path d="M12 5v14"/><path d="M5 12h14"/></>,
        rocket: <><path d="M4.5 16.5c-1.2 1-1.5 3.5-1.5 3.5s2.5-.3 3.5-1.5c.6-.7.6-1.7 0-2.3-.6-.6-1.6-.6-2 .3z"/><path d="M9 15 5 11l3-3c3-3 7-4 11-4 0 4-1 8-4 11l-3 3-3-3z"/><path d="M9 15c0 1.5-1.5 3-3 3"/><path d="M15 9h.01"/></>,
        navigation: <polygon points="3 11 22 2 13 21 11 13 3 11"/>, 
        sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></>,
        zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>, 
        shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>, 
        compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>, 
        crown: <><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></>, 
        trophy: <><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v6a5 5 0 0 1-10 0V4z"/><path d="M5 6H3v2a4 4 0 0 0 4 4"/><path d="M19 6h2v2a4 4 0 0 1-4 4"/></>,
        x: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
        star: <polygon points="12 2 15.1 8.3 22 9.3 17 14.2 18.2 21 12 17.8 5.8 21 7 14.2 2 9.3 8.9 8.3 12 2"/>,
        sparkles: <><path d="m12 3 1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z"/><path d="m5 15 .8 2.2L8 18l-2.2.8L5 21l-.8-2.2L2 18l2.2-.8L5 15z"/><path d="m19 14 .8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        cloud: <><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></>,
        radio: <><circle cx="12" cy="12" r="2"/><path d="M4.93 19.07a10 10 0 0 1 0-14.14"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>,
        home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        crosshair: <><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></>,
        activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      };

      function Icon({ name, size = 24, className = '', filled = false, ...props }) {
        return (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={filled ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true" {...props}>
            {iconPaths[name]}
          </svg>
        );
      }

      // 진화 단계 (15단계 세분화)
      const RANKS = [
        { level: 1, title: '알 우주선', minLy: 0, maxLy: 150, icon: 'moon' },
        { level: 2, title: '종이 비행선', minLy: 151, maxLy: 350, icon: 'plane' },
        { level: 3, title: '열기구 탐사선', minLy: 351, maxLy: 600, icon: 'cloud' },
        { level: 4, title: '꼬마 로켓', minLy: 601, maxLy: 1000, icon: 'rocket' },
        { level: 5, title: '통신 위성', minLy: 1001, maxLy: 1500, icon: 'radio' },
        { level: 6, title: '정찰 위성', minLy: 1501, maxLy: 2200, icon: 'navigation' },
        { level: 7, title: '궤도 기지', minLy: 2201, maxLy: 3000, icon: 'home' },
        { level: 8, title: '달 탐사선', minLy: 3001, maxLy: 4000, icon: 'crosshair' },
        { level: 9, title: '태양 돛단배', minLy: 4001, maxLy: 5200, icon: 'sun' },
        { level: 10, title: '소행성 채굴선', minLy: 5201, maxLy: 6800, icon: 'activity' },
        { level: 11, title: '이온 추진선', minLy: 6801, maxLy: 8800, icon: 'zap' },
        { level: 12, title: '성간 순양함', minLy: 8801, maxLy: 11500, icon: 'shield' },
        { level: 13, title: '은하계 탐사선', minLy: 11501, maxLy: 15000, icon: 'compass' },
        { level: 14, title: '초공간 도약선', minLy: 15001, maxLy: 20000, icon: 'crown' },
        { level: 15, title: '우주 정복자', minLy: 20001, maxLy: Number.POSITIVE_INFINITY, icon: 'trophy' },
      ];

      function createBookId() {
        return window.crypto?.randomUUID ? window.crypto.randomUUID() : `book-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      }

      // 심우주의 감성적인 무작위 그라데이션 행성 생성
      function getDynamicThemeId(index) {
        if (index < PLANET_THEMES.length) return PLANET_THEMES[index].id;
        return `deep-space-${index}`;
      }

      function getThemeById(themeId) {
        const found = PLANET_THEMES.find((theme) => theme.id === themeId);
        if (found) return found;

        if (themeId && themeId.startsWith('deep-space-')) {
          const idx = parseInt(themeId.split('-')[2]) || 0;
          const hue1 = (idx * 137.5) % 360; 
          const hue2 = (hue1 + 50) % 360;
          const hasRing = idx % 3 === 0;
          
          return {
            id: themeId,
            name: `미지의 행성 X-${idx}`,
            desc: `빛조차 닿기 힘든 심우주에서 발견된 신비롭고 영롱한 미지의 세계입니다.`,
            bg: `radial-gradient(circle at 40% 30%, hsla(${hue1}, 80%, 70%, 0.6) 0%, transparent 50%), linear-gradient(135deg, hsl(${hue1}, 70%, 60%), hsl(${hue2}, 80%, 30%), #111)`,
            glow: `hsla(${hue1}, 80%, 60%, 0.5)`,
            ringColor: hasRing ? `hsla(${hue2}, 70%, 60%, 0.6)` : 'transparent',
            hasRing: hasRing,
            stripesOpacity: idx % 2 === 0 ? 0.2 : 0
          };
        }
        return PLANET_THEMES[0];
      }

      function getPlanetTilt(themeId, index) {
        if (themeId === 'uranus') return 75;
        if (themeId.startsWith('deep-space-')) return Math.round(Math.sin(index * 123) * 60);
        return ((index % 7) - 3) * 8;
      }

      function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
      function getPlanetRadius(size) { return clamp(size, 50, 140) / 2; }
      function getPositionMargins(size) {
        const radius = getPlanetRadius(size) + 30;
        return { x: (radius / CANVAS_MODEL.width) * 100, y: (radius / CANVAS_MODEL.height) * 100 };
      }

      // 중앙에서부터 나선형으로 뻗어나가는 정렬 알고리즘 (황금각 피보나치)
      function findPlanetPosition(existingPlanets, size, newIndex) {
        const margins = getPositionMargins(size);
        const goldenAngle = 137.508 * (Math.PI / 180);
        
        let validPos = null;
        for(let i = newIndex; i < newIndex + 100; i++) {
            const angle = i * goldenAngle;
            const radius = 5 + Math.sqrt(i) * 7.5; 

            const x = clamp(50 + Math.cos(angle) * radius, margins.x, 100 - margins.x);
            const y = clamp(50 + Math.sin(angle) * radius, margins.y, 100 - margins.y);
            
            // 약간의 겹침은 허용하여 우주 공간의 밀도를 예쁘게 함
            let isOverlappingTooMuch = false;
            for(const planet of existingPlanets) {
                const dx = ((planet.x - x) / 100) * CANVAS_MODEL.width;
                const dy = ((planet.y - y) / 100) * CANVAS_MODEL.height;
                const dist = Math.hypot(dx, dy);
                if(dist < (getPlanetRadius(planet.size) + getPlanetRadius(size)) * 0.75) {
                    isOverlappingTooMuch = true;
                    break;
                }
            }
            if(!isOverlappingTooMuch) {
                validPos = { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
                break;
            }
        }
        return validPos || { x: 50, y: 50 };
      }

      function normalizeBook(book, index) {
        const pages = Math.max(1, Number(book.pages) || 1);
        const rating = clamp(Number(book.rating) || 5, 1, 5);
        const size = clamp(Number(book.size) || 80, 50, 140);
        
        const themeId = getDynamicThemeId(index);
        const theme = getThemeById(themeId);
        
        // 기존 좌표 무시하고 순서에 맞게 나선형 궤도로 재정렬
        const orderedPos = findPlanetPosition([], size, index);
        
        let tilt = Number(book.tilt) || getPlanetTilt(themeId, index);

        return {
          id: book.id ?? createBookId(),
          title: String(book.title ?? `책 ${index + 1}`),
          pages: pages,
          rating: rating,
          review: String(book.review ?? ''),
          x: orderedPos.x,
          y: orderedPos.y,
          size: size,
          themeId: themeId,
          hasRing: theme.hasRing,
          tilt: tilt,
        };
      }

      // ★ 심미적인 3D 크리스탈 행성 컴포넌트 ★
      function PlanetVisual({ book, isSelected = false, compact = false }) {
        const theme = getThemeById(book.themeId);
        const displaySize = compact ? 56 : book.size;
        
        return (
          <span
            className={`planet-stage ${isSelected ? 'planet-selected' : ''}`}
            style={{
              '--planet-size': compact ? '56px' : `clamp(50px, ${book.size}px, 22vw)`,
              '--planet-ring-width': `${Math.max(2, displaySize * 0.03)}px`,
              '--planet-bg': theme.bg,
              '--planet-bg-size': theme.bgSize || 'auto',
              '--planet-glow': theme.glow, 
              '--planet-ring-color': theme.ringColor || 'transparent',
              '--planet-stripes-opacity': theme.stripesOpacity || 0,
              '--planet-tilt': `${book.tilt ?? 0}deg`
            }}
          >
            {book.hasRing && <span className="planet-ring planet-ring-back" />}
            
            <span className="planet-body">
              {/* 가스형 띠 질감 오버레이 */}
              <span className="planet-stripes" />
            </span>

            {book.hasRing && <span className="planet-ring planet-ring-front" />}
          </span>
        );
      }

      function App() {
        const [books, setBooks] = useState([]);
        const [isInitialLoad, setIsInitialLoad] = useState(true);
        const [isSubmitting, setIsSubmitting] = useState(false);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [selectedBookId, setSelectedBookId] = useState(null);
        
        const emptyBookForm = { title: '', pages: '', rating: 5, review: '' };
        const [newBook, setNewBook] = useState(emptyBookForm);
        const [formError, setFormError] = useState('');
        
        const [searchQuery, setSearchQuery] = useState('');
        const [searchResults, setSearchResults] = useState([]);
        const [isSearching, setIsSearching] = useState(false);
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        const searchDropdownRef = useRef(null);

        // 초기 데이터 로드 (나선형 궤도로 순서대로 배치)
        useEffect(() => {
          const loadData = async () => {
            if (SCRIPT_URL) {
              try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                if (data && data.length > 0) {
                    const arranged = [];
                    data.forEach((book, i) => {
                        const normalized = normalizeBook(book, i);
                        const finalPos = findPlanetPosition(arranged, normalized.size, i);
                        arranged.push({...normalized, x: finalPos.x, y: finalPos.y});
                    });
                    setBooks(arranged);
                } else {
                    setBooks([]);
                }
              } catch (e) {
                console.error("데이터 불러오기 실패, 로컬 저장소를 사용합니다.", e);
                loadFromLocal();
              }
            } else {
              loadFromLocal();
            }
            setIsInitialLoad(false);
          };
          
          const loadFromLocal = () => {
            try {
              const saved = window.localStorage.getItem(STORAGE_KEY);
              if (saved) {
                  const data = JSON.parse(saved);
                  const arranged = [];
                  data.forEach((book, i) => {
                      const normalized = normalizeBook(book, i);
                      const finalPos = findPlanetPosition(arranged, normalized.size, i);
                      arranged.push({...normalized, x: finalPos.x, y: finalPos.y});
                  });
                  setBooks(arranged);
              }
            } catch (e) {}
          };

          loadData();
        }, []);

        useEffect(() => {
          if (!isInitialLoad && !SCRIPT_URL) {
            try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); } catch (e) {}
          }
        }, [books, isInitialLoad]);

        useEffect(() => {
          const handleClickOutside = (e) => {
            if (searchDropdownRef.current && !searchDropdownRef.current.contains(e.target)) setIsDropdownOpen(false);
          };
          document.addEventListener('mousedown', handleClickOutside);
          return () => document.removeEventListener('mousedown', handleClickOutside);
        }, []);

        useEffect(() => {
          if (!searchQuery.trim()) { setSearchResults([]); return; }
          const timeoutId = setTimeout(async () => {
            setIsSearching(true);
            try {
              const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(searchQuery)}&maxResults=5&langRestrict=ko`);
              const data = await res.json();
              if (data.items) {
                setSearchResults(data.items.map(item => ({
                  id: item.id, title: item.volumeInfo.title,
                  author: item.volumeInfo.authors ? item.volumeInfo.authors.join(', ') : '작자 미상',
                  pages: item.volumeInfo.pageCount || '',
                  thumbnail: item.volumeInfo.imageLinks?.smallThumbnail?.replace('http:', 'https:') || ''
                })));
              } else {
                setSearchResults([]);
              }
            } catch (e) { console.error('검색 실패:', e); } finally { setIsSearching(false); }
          }, 500);
          return () => clearTimeout(timeoutId);
        }, [searchQuery]);

        // 진화 상태 (15단계 반영)
        const totalLy = useMemo(() => books.reduce((sum, book) => sum + book.pages, 0), [books]);
        const currentIndex = RANKS.findIndex(r => totalLy >= r.minLy && totalLy <= r.maxLy) !== -1 
                            ? RANKS.findIndex(r => totalLy >= r.minLy && totalLy <= r.maxLy) : RANKS.length - 1;
        
        const currentRank = RANKS[currentIndex];
        const prevRank = currentIndex > 0 ? RANKS[currentIndex - 1] : null;
        const nextRank = currentIndex < RANKS.length - 1 ? RANKS[currentIndex + 1] : null;
        const remainingLy = nextRank ? Math.max(0, nextRank.minLy - totalLy) : 0;
        const progressPercent = nextRank ? Math.min(100, Math.max(0, ((totalLy - currentRank.minLy) / (nextRank.minLy - currentRank.minLy)) * 100)) : 100;
        const selectedBook = books.find(b => b.id === selectedBookId) ?? books[books.length - 1] ?? null;

        const backgroundStars = useMemo(() => Array.from({ length: 40 }).map((_, i) => ({
          id: i, x: Math.random() * 100, y: Math.random() * 100, size: Math.random() * 3 + 1,
          opacity: Math.random() * 0.5 + 0.1, animDelay: `${Math.random() * 3}s`,
        })), []);
        const shootingStars = useMemo(() => Array.from({ length: 4 }).map((_, i) => ({
          id: i, top: Math.random() * 40, left: Math.random() * 60 + 40,
          delay: Math.random() * 15 + i * 2, duration: Math.random() * 1.5 + 2,
        })), []);

        const handleSelectSearchedBook = (book) => {
          setSearchQuery(book.title);
          setNewBook(prev => ({ ...prev, title: book.title, pages: book.pages ? String(book.pages) : prev.pages }));
          setIsDropdownOpen(false);
        };

        const handleAddBook = async (e) => {
          e.preventDefault();
          const title = newBook.title.trim(), pages = Number(newBook.pages);
          if (!title || !Number.isFinite(pages) || pages < 1) { setFormError('책 제목과 1 이상의 페이지 수를 입력해 주세요.'); return; }

          setIsSubmitting(true);
          const newIndex = books.length;
          const size = Math.max(50, Math.min(140, 40 + pages / 10));
          
          const themeId = getDynamicThemeId(newIndex);
          const theme = getThemeById(themeId);
          const pos = findPlanetPosition(books, size, newIndex);
          let tilt = getPlanetTilt(themeId, newIndex);
          
          const addedBook = {
            id: createBookId(), title, pages: Math.floor(pages), rating: newBook.rating, review: newBook.review.trim(),
            x: pos.x, y: pos.y, size, themeId: themeId, hasRing: theme.hasRing, tilt: tilt,
          };

          if (SCRIPT_URL) {
            try {
              await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(addedBook)
              });
            } catch (error) { console.error('기록 저장 실패:', error); }
          }

          setBooks(curr => [...curr, addedBook]);
          setSelectedBookId(addedBook.id);
          setNewBook(emptyBookForm);
          setSearchQuery('');
          setFormError('');
          setIsSubmitting(false);
          setIsModalOpen(false);
        };

        if (isInitialLoad && SCRIPT_URL) {
          return (
            <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-indigo-400 font-cute gap-4">
              <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              <p className="text-xl animate-pulse">우주 관측소에서 나의 별자리를 가져오는 중...</p>
            </div>
          );
        }

        return (
          <div className="min-h-screen bg-slate-950 text-slate-300 font-cute selection:bg-indigo-500/30 pb-24 md:pb-12 overflow-x-hidden relative">
            <header className="border-b border-slate-800/60 bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
              <div className="max-w-4xl mx-auto px-4 py-4 flex justify-between items-end">
                <div>
                  <h1 className="text-2xl sm:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-1 flex items-center gap-2">
                    <Icon name="rocket" size={28} className="text-indigo-400 shrink-0" />
                    나만의 독서 우주
                  </h1>
                  <p className="text-slate-400 text-sm">책을 읽어 빛나는 행성을 띄우고 심우주로 나아가세요!</p>
                </div>
              </div>
            </header>

            <main>
              {/* 진화 대시보드 */}
              <section className="max-w-4xl mx-auto px-4 py-6 relative z-10">
                <div className="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-4 sm:p-6 shadow-2xl flex flex-col items-center">
                  <h2 className="text-slate-300 text-lg mb-6 flex items-center gap-2">
                    <Icon name="sparkles" size={18} className="text-yellow-400" />
                    우주선 진화 과정 (Level {currentIndex + 1}/{RANKS.length})
                    <Icon name="sparkles" size={18} className="text-yellow-400" />
                  </h2>

                  <div className="grid grid-cols-[72px_minmax(120px,1fr)_72px] sm:grid-cols-[96px_1fr_144px_1.5fr_96px] items-center justify-between w-full max-w-3xl gap-2 sm:gap-0">
                    <div className="flex flex-col items-center">
                      {prevRank ? (
                        <>
                          <div className="w-12 h-12 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mb-2 opacity-50">
                            <Icon name={prevRank.icon} size={24} className="text-slate-500" />
                          </div>
                          <span className="text-xs text-slate-500 text-center leading-tight">{prevRank.title}</span>
                        </>
                      ) : <div className="w-12 h-12" />}
                    </div>

                    <div className="h-1 bg-slate-800 rounded-full relative hidden sm:block">
                      {prevRank && <div className="absolute inset-0 bg-indigo-500/30 rounded-full" />}
                    </div>

                    <div className="flex flex-col items-center relative group shrink-0">
                      <div className="absolute top-0 w-20 h-20 bg-indigo-500 rounded-full blur-xl opacity-40 animate-pulse" />
                      <div className="w-20 h-20 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center relative z-10 border-4 border-slate-900 shadow-[0_0_20px_rgba(99,102,241,0.5)] transform transition-transform duration-300 hover:scale-110">
                        <Icon name={currentRank.icon} size={36} className="text-white drop-shadow-md" />
                      </div>
                      <div className="mt-3 text-center">
                        <span className="text-base sm:text-lg font-bold text-white block leading-tight">{currentRank.title}</span>
                        <span className="text-sm text-indigo-300 font-medium">{totalLy.toLocaleString()} 광년</span>
                      </div>
                    </div>

                    {nextRank ? (
                      <div className="col-span-3 sm:col-span-1 row-start-2 sm:row-start-auto mx-1 sm:mx-6 mt-5 sm:mt-0 flex flex-col justify-center relative min-w-[80px]">
                        <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                          <div className="h-full bg-gradient-to-r from-indigo-500 to-pink-500 progress-stripe transition-all duration-1000" style={{ width: `${progressPercent}%` }} />
                        </div>
                        <div className="mt-2 self-center bg-indigo-500/20 text-indigo-200 border border-indigo-500/30 px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap shadow-lg">
                          다음 등급까지 {remainingLy.toLocaleString()} 광년!
                        </div>
                      </div>
                    ) : <div className="hidden sm:block" />}

                    <div className="flex flex-col items-center">
                      {nextRank ? (
                        <>
                          <div className="w-14 h-14 rounded-2xl bg-slate-800 border-2 border-dashed border-slate-600 flex items-center justify-center mb-2">
                            <Icon name={nextRank.icon} size={28} className="text-slate-500" />
                          </div>
                          <span className="text-xs text-slate-400 text-center leading-tight">{nextRank.title}</span>
                        </>
                      ) : (
                        <>
                          <div className="w-14 h-14 rounded-2xl bg-gradient-to-tr from-yellow-400 to-orange-500 flex items-center justify-center mb-2 shadow-[0_0_15px_rgba(250,204,21,0.5)]">
                            <Icon name="star" size={28} className="text-white animate-pulse" />
                          </div>
                          <span className="text-xs text-yellow-400 font-bold text-center leading-tight">최종 목표 달성!</span>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              </section>

              {/* 우주 공간 & 책 정보 패널 */}
              <section className="max-w-5xl mx-auto px-4 grid lg:grid-cols-[minmax(0,1fr)_300px] gap-6">
                
                {/* 캔버스 영역 */}
                <div className="relative w-full h-[460px] sm:h-[540px] bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
                  {/* 별과 별똥별 배경 */}
                  <div className="absolute inset-0 opacity-70 mix-blend-screen" style={{background: 'radial-gradient(circle at center, transparent 0%, #020617 100%)', pointerEvents: 'none'}}></div>
                  {backgroundStars.map(star => (
                    <div key={star.id} className="absolute rounded-full bg-white animate-pulse" style={{ left: `${star.x}%`, top: `${star.y}%`, width: `${star.size}px`, height: `${star.size}px`, opacity: star.opacity, animationDelay: star.animDelay, animationDuration: '3s' }} />
                  ))}
                  {shootingStars.map(star => (
                    <div key={`s-${star.id}`} className="shooting-star" style={{ top: `${star.top}%`, left: `${star.left}%`, animation: `shootingStar ${star.duration}s linear infinite`, animationDelay: `${star.delay}s` }} />
                  ))}
                  
                  {/* 나선형 궤도선 */}
                  {books.length > 1 && (
                    <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-20" viewBox="0 0 100 100" preserveAspectRatio="none">
                      {books.map((b, i) => {
                        if (i === 0) return null;
                        const p = books[i - 1];
                        // 완만한 베지에 곡선으로 행성들을 연결
                        const cx = (p.x + b.x) / 2 + (b.y - p.y) * 0.2;
                        const cy = (p.y + b.y) / 2 - (b.x - p.x) * 0.2;
                        return <path key={`l-${b.id}`} d={`M ${p.x} ${p.y} Q ${cx} ${cy} ${b.x} ${b.y}`} fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="0.4" strokeDasharray="1 1.5" />;
                      })}
                    </svg>
                  )}
                  
                  {/* 영롱한 행성들 */}
                  {books.map((book, i) => (
                    <div key={book.id} className="absolute animate-pop-in" style={{ left: `${book.x}%`, top: `${book.y}%`, zIndex: selectedBookId === book.id ? 20 : 10 }}>
                      <div className="planet-float flex flex-col items-center" style={{ animationDelay: `${(i % 5) * 0.4}s` }}>
                        <button type="button" onClick={() => setSelectedBookId(book.id)} className="group rounded-full focus:outline-none transition-transform hover:scale-105">
                          <PlanetVisual book={book} isSelected={selectedBookId === book.id} />
                        </button>
                        
                        {/* 행성 이름표 */}
                        <div className="absolute top-[calc(100%+12px)] text-indigo-50 text-xs font-bold opacity-80 text-center whitespace-nowrap bg-slate-950/80 px-3 py-1.5 rounded-full border border-slate-700/80 backdrop-blur-sm pointer-events-none shadow-lg transition-opacity group-hover:opacity-100 flex items-center gap-1.5">
                          <span className="w-2 h-2 rounded-full shadow-[0_0_5px_currentColor]" style={{background: getThemeById(book.themeId).bg}}></span>
                          {getThemeById(book.themeId).name}
                        </div>
                      </div>
                    </div>
                  ))}
                  
                  {books.length === 0 && (
                     <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 p-6 text-center">
                        <Icon name="sparkles" size={48} className="mb-4 opacity-50" />
                        <p className="text-lg mb-2">아직 우주가 비어있어요.</p>
                        <p className="text-sm">우측 하단의 + 버튼을 눌러 첫 번째 책을 읽고 우주를 탄생시켜 보세요!</p>
                     </div>
                  )}
                </div>

                {/* 사이드바 정보 */}
                <aside className="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl flex flex-col">
                  {selectedBook ? (
                    <div className="flex flex-col h-full animate-pop-in">
                      <div className="mb-6 self-center relative w-24 h-24 flex items-center justify-center">
                          <div className="absolute inset-0 bg-indigo-500/10 rounded-full blur-xl animate-pulse"></div>
                          <PlanetVisual book={selectedBook} isSelected compact />
                      </div>
                      
                      {/* 행성 과학 정보 */}
                      <div className="bg-indigo-950/40 border border-indigo-500/20 rounded-2xl p-4 mb-5 shadow-inner">
                        <div className="flex items-center gap-2 mb-2">
                           <Icon name="sparkles" size={16} className="text-indigo-400" />
                           <span className="text-indigo-300 text-sm font-bold tracking-wide">탐사 보고서</span>
                        </div>
                        <h3 className="text-white font-bold text-base mb-1">{getThemeById(selectedBook.themeId).name}</h3>
                        <p className="text-xs text-indigo-200/90 leading-relaxed">{getThemeById(selectedBook.themeId).desc}</p>
                      </div>

                      {/* 독서 기록 정보 */}
                      <h2 className="text-white text-2xl font-bold leading-tight break-words mb-2">{selectedBook.title}</h2>
                      <p className="text-sm text-indigo-300 bg-indigo-500/10 inline-block px-3 py-1 rounded-full w-fit mb-4 border border-indigo-500/20">
                          {selectedBook.pages.toLocaleString()} 광년 (페이지)
                      </p>
                      
                      <div className="flex gap-1 mb-4">
                        {[...Array(5)].map((_, i) => (
                          <Icon key={i} name="star" size={20} filled={i < selectedBook.rating} className={i < selectedBook.rating ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]' : 'text-slate-700'} />
                        ))}
                      </div>
                      
                      {selectedBook.review ? (
                        <div className="mt-2 text-sm text-slate-300 bg-slate-950/80 border border-slate-800 p-4 rounded-2xl leading-relaxed flex-1 overflow-y-auto shadow-inner">
                            <span className="text-indigo-500 text-lg leading-none font-serif block mb-1">"</span>
                            {selectedBook.review}
                        </div>
                      ) : <p className="mt-2 text-sm text-slate-500 flex-1">아직 감상평이 없어요.</p>}
                    </div>
                  ) : (
                    <div className="h-full flex flex-col justify-center items-center text-center text-slate-500">
                      <Icon name="book" size={40} className="mb-4 text-slate-700" />
                      <p className="text-lg font-bold text-slate-400 mb-2">행성을 선택해보세요</p>
                      <p className="text-sm">우주에 떠 있는 행성을 클릭하면<br/>해당 책의 정보를 볼 수 있습니다.</p>
                    </div>
                  )}
                </aside>
              </section>
            </main>

            {/* 기록 추가 플로팅 버튼 */}
            <button onClick={() => { setFormError(''); setIsModalOpen(true); }} className="fixed bottom-8 right-8 lg:bottom-12 lg:right-12 bg-gradient-to-r from-indigo-500 to-purple-600 text-white p-5 rounded-full shadow-[0_0_25px_rgba(99,102,241,0.6)] hover:scale-110 hover:shadow-[0_0_35px_rgba(99,102,241,0.9)] transition-all z-40">
              <Icon name="plus" size={32} />
            </button>

            {/* 모달 창 (도서 검색 기능 포함) */}
            {isModalOpen && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4" onMouseDown={() => !isSubmitting && setIsModalOpen(false)}>
                <div className="bg-slate-900 border border-slate-700 w-full max-w-md rounded-3xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] animate-pop-in" onMouseDown={e => e.stopPropagation()}>
                  <div className="bg-slate-800/80 p-5 flex justify-between items-center border-b border-slate-700">
                    <h2 className="text-xl font-bold text-white flex items-center gap-2"><Icon name="book" size={24} className="text-indigo-400" /> 새로운 행성 기록</h2>
                    <button onClick={() => !isSubmitting && setIsModalOpen(false)} className="text-slate-400 hover:text-white transition-colors bg-slate-800 p-1.5 rounded-full"><Icon name="x" size={20} /></button>
                  </div>

                  <form onSubmit={handleAddBook} className="p-6 space-y-5">
                    <div className="relative" ref={searchDropdownRef}>
                      <label className="block text-sm font-medium text-slate-300 mb-1.5 ml-1">책 제목 검색</label>
                      <div className="relative">
                        <input
                          required type="text" value={searchQuery}
                          onChange={(e) => { setSearchQuery(e.target.value); setNewBook(b => ({ ...b, title: e.target.value })); setIsDropdownOpen(true); }}
                          onFocus={() => { if(searchQuery) setIsDropdownOpen(true); }}
                          className="w-full bg-slate-950 border border-slate-700 rounded-2xl pl-11 pr-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all shadow-inner"
                          placeholder="어떤 책을 읽으셨나요?" autoComplete="off" disabled={isSubmitting}
                        />
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"><Icon name="search" size={20} /></div>
                      </div>
                      
                      {isDropdownOpen && searchQuery.trim() !== '' && (
                        <div className="absolute z-20 w-full mt-2 bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl max-h-64 overflow-y-auto divide-y divide-slate-700/50">
                          {isSearching ? (
                            <div className="p-5 text-center text-slate-400 flex items-center justify-center gap-2">
                              <div className="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div> 우주 도서관 검색 중...
                            </div>
                          ) : searchResults.length > 0 ? (
                            searchResults.map(book => (
                              <button key={book.id} type="button" onClick={() => handleSelectSearchedBook(book)} className="w-full text-left p-3 hover:bg-slate-700 transition-colors flex gap-3 items-center focus:bg-slate-700 outline-none">
                                {book.thumbnail ? <img src={book.thumbnail} alt="" className="w-12 h-16 object-cover rounded-lg shrink-0 shadow-md" /> : <div className="w-12 h-16 bg-slate-900 rounded-lg flex items-center justify-center shrink-0 border border-slate-700"><Icon name="book" size={20} className="text-slate-500" /></div>}
                                <div className="flex-1 overflow-hidden">
                                  <div className="text-white font-bold truncate text-sm">{book.title}</div>
                                  <div className="text-slate-400 text-xs truncate mt-1">{book.author}</div>
                                  {book.pages && <div className="text-indigo-400 text-xs mt-1 bg-indigo-500/10 inline-block px-2 py-0.5 rounded">{book.pages} 광년</div>}
                                </div>
                              </button>
                            ))
                          ) : <div className="p-5 text-center text-slate-400 text-sm">검색 결과가 없습니다. 직접 입력해 주세요.</div>}
                        </div>
                      )}
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1.5 ml-1">페이지 수 (광년)</label>
                      <input required type="number" min="1" value={newBook.pages} onChange={e => setNewBook(b => ({ ...b, pages: e.target.value }))} className="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all shadow-inner" placeholder="예: 250" disabled={isSubmitting} />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-2 ml-1">별점</label>
                      <div className="flex gap-1 bg-slate-950 border border-slate-700 p-2 rounded-2xl w-fit">
                        {[1, 2, 3, 4, 5].map(star => (
                          <button key={star} type="button" onClick={() => setNewBook(b => ({ ...b, rating: star }))} disabled={isSubmitting} className="p-1 focus:outline-none transition-transform hover:scale-110">
                            <Icon name="star" size={32} filled={star <= newBook.rating} className={star <= newBook.rating ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)]' : 'text-slate-700'} />
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1.5 ml-1">한 줄 감상평</label>
                      <textarea value={newBook.review} onChange={e => setNewBook(b => ({ ...b, review: e.target.value }))} className="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none transition-all shadow-inner" rows="2" placeholder="이 책을 읽고 느낀 점을 적어보세요." disabled={isSubmitting} />
                    </div>

                    {formError && <p className="text-sm text-rose-300 bg-rose-500/10 border border-rose-500/30 rounded-xl px-4 py-3">{formError}</p>}

                    <button type="submit" disabled={isSubmitting || !newBook.title || !newBook.pages} className="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold text-lg py-4 rounded-2xl mt-2 hover:shadow-[0_0_25px_rgba(99,102,241,0.6)] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
                      {isSubmitting ? <><div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>기록 중...</> : '행성 띄우기 🚀'}
                    </button>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
