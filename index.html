<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나만의 독서 우주</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

      .font-cute {
        font-family: 'Jua', sans-serif;
      }

      @keyframes float {
        0% { transform: translate(-50%, -50%) translateY(0); }
        50% { transform: translate(-50%, -50%) translateY(-15px); }
        100% { transform: translate(-50%, -50%) translateY(0); }
      }

      .planet-float {
        animation: float 4s ease-in-out infinite;
        position: absolute;
        transform: translate(-50%, -50%);
      }

      @keyframes shootingStar {
        0% { transform: translateX(0) translateY(0) rotate(-45deg) scale(1); opacity: 1; }
        100% { transform: translateX(-800px) translateY(800px) rotate(-45deg) scale(0); opacity: 0; }
      }

      .shooting-star {
        position: absolute;
        width: 120px;
        height: 3px;
        background: linear-gradient(to right, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
        border-radius: 999px;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 1));
      }

      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.12); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      .animate-pop-in {
        animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes stripe {
        0% { background-position: 0 0; }
        100% { background-position: 40px 40px; }
      }

      .progress-stripe {
        background-image: linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.15) 25%, transparent 25%,
          transparent 50%,
          rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.15) 75%,
          transparent 75%, transparent
        );
        background-size: 40px 40px;
        animation: stripe 1s linear infinite;
      }

      .planet-character {
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
      }
      .planet-character:hover, .planet-character.is-selected {
        transform: scale(1.15);
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4)) drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6));
      }
      
      .spinner {
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #818cf8;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      @media (prefers-reduced-motion: reduce) {
        .planet-float, .shooting-star, .progress-stripe, .animate-pop-in, .animate-pulse, .animate-bounce, .spinner {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-950">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const STORAGE_KEY = 'reading-universe-books';
      
      // ★ 여기에 구글 앱스 스크립트에서 배포한 웹 앱 URL을 붙여넣으세요! ★
      // 예시: 'https://script.google.com/macros/s/AKfycb.../exec'
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKfQuMBDXAiF0hwuXuYJ88YtbSH3LvVXh9eOMGmitiIcuiNzouJf7TeuNAe1ttFYfo/exec'; 

      const CANVAS_MODEL = { width: 760, height: 500 };

      const PLANET_THEMES = [
        { id: 'amber', colors: ['#fef08a', '#eab308', '#fde047'], hasRing: false },
        { id: 'aurora', colors: ['#bfdbfe', '#60a5fa', '#93c5fd'], hasRing: true },
        { id: 'garden', colors: ['#bbf7d0', '#4ade80', '#86efac'], hasRing: false },
        { id: 'rose', colors: ['#fbcfe8', '#f472b6', '#f9a8d4'], hasRing: false },
        { id: 'violet', colors: ['#e9d5ff', '#a855f7', '#d8b4fe'], hasRing: true },
        { id: 'lagoon', colors: ['#a5f3fc', '#22d3ee', '#67e8f9'], hasRing: false },
        { id: 'ember', colors: ['#fed7aa', '#fb923c', '#fdba74'], hasRing: false },
      ];

      const iconPaths = {
        book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z" /></>,
        moon: <path d="M12 3a6.7 6.7 0 0 0 8.7 8.7A8.6 8.6 0 1 1 12 3z" />,
        plane: <><path d="M17.8 19.2 16 11l6-6-17 7 7 2 2 7 3.8-1.8z" /><path d="m12 14 4-3" /></>,
        plus: <><path d="M12 5v14" /><path d="M5 12h14" /></>,
        rocket: <><path d="M4.5 16.5c-1.2 1-1.5 3.5-1.5 3.5s2.5-.3 3.5-1.5c.6-.7.6-1.7 0-2.3-.6-.6-1.6-.6-2 .3z" /><path d="M9 15 5 11l3-3c3-3 7-4 11-4 0 4-1 8-4 11l-3 3-3-3z" /><path d="M9 15c0 1.5-1.5 3-3 3" /><path d="M15 9h.01" /></>,
        sparkles: <><path d="m12 3 1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" /><path d="m5 15 .8 2.2L8 18l-2.2.8L5 21l-.8-2.2L2 18l2.2-.8L5 15z" /><path d="m19 14 .8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z" /></>,
        star: <polygon points="12 2 15.1 8.3 22 9.3 17 14.2 18.2 21 12 17.8 5.8 21 7 14.2 2 9.3 8.9 8.3 12 2" />,
        sun: <><circle cx="12" cy="12" r="4" /><path d="M12 2v2" /><path d="M12 20v2" /><path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" /><path d="M2 12h2" /><path d="M20 12h2" /><path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" /></>,
        trophy: <><path d="M8 21h8" /><path d="M12 17v4" /><path d="M7 4h10v6a5 5 0 0 1-10 0V4z" /><path d="M5 6H3v2a4 4 0 0 0 4 4" /><path d="M19 6h2v2a4 4 0 0 1-4 4" /></>,
        x: <><path d="M18 6 6 18" /><path d="m6 6 12 12" /></>,
        cloud: <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />,
      };

      function Icon({ name, size = 24, className = '', filled = false, ...props }) {
        return (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={filled ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true" {...props}>
            {iconPaths[name]}
          </svg>
        );
      }

      const RANKS = [
        { level: 1, title: '알 우주선', minLy: 0, maxLy: 500, icon: 'moon' },
        { level: 2, title: '종이 비행선', minLy: 501, maxLy: 1500, icon: 'plane' },
        { level: 3, title: '꼬마 로켓', minLy: 1501, maxLy: 3000, icon: 'rocket' },
        { level: 4, title: '태양 돛단배', minLy: 3001, maxLy: 5000, icon: 'sun' },
        { level: 5, title: '우주 정복자', minLy: 5001, maxLy: Number.POSITIVE_INFINITY, icon: 'trophy' },
      ];

      function createBookId() {
        return window.crypto?.randomUUID ? window.crypto.randomUUID() : `book-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      }

      function getThemeById(themeId) {
        return PLANET_THEMES.find((t) => t.id === themeId) ?? PLANET_THEMES[0];
      }

      function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
      function getPlanetRadius(size) { return clamp(size, 60, 150) / 2; }
      
      function getPositionMargins(size) {
        const radius = getPlanetRadius(size) + 26;
        return { x: (radius / CANVAS_MODEL.width) * 100, y: (radius / CANVAS_MODEL.height) * 100 };
      }

      function clampPlanetPosition(planet) {
        const margins = getPositionMargins(planet.size);
        return { ...planet, x: clamp(planet.x, margins.x, 100 - margins.x), y: clamp(planet.y, margins.y, 100 - margins.y) };
      }

      function getCollisionGap(a, b, padding = 22) {
        const dx = ((b.x - a.x) / 100) * CANVAS_MODEL.width;
        const dy = ((b.y - a.y) / 100) * CANVAS_MODEL.height;
        return Math.hypot(dx, dy) - (getPlanetRadius(a.size) + getPlanetRadius(b.size) + padding);
      }

      function spreadPlanets(planets) {
        const arranged = planets.map(clampPlanetPosition);
        for (let iteration = 0; iteration < 70; iteration += 1) {
          let moved = false;
          for (let i = 0; i < arranged.length; i++) {
            for (let j = i + 1; j < arranged.length; j++) {
              const gap = getCollisionGap(arranged[i], arranged[j]);
              if (gap >= 0) continue;
              
              const dx = ((arranged[j].x - arranged[i].x) / 100) * CANVAS_MODEL.width || Math.cos(i + j);
              const dy = ((arranged[j].y - arranged[i].y) / 100) * CANVAS_MODEL.height || Math.sin(i + j);
              const distance = Math.max(1, Math.hypot(dx, dy));
              const push = Math.abs(gap) / 2 + 1;
              const ux = dx / distance, uy = dy / distance;

              arranged[i] = clampPlanetPosition({
                ...arranged[i],
                x: arranged[i].x - (ux * push * 100) / CANVAS_MODEL.width,
                y: arranged[i].y - (uy * push * 100) / CANVAS_MODEL.height,
              });
              arranged[j] = clampPlanetPosition({
                ...arranged[j],
                x: arranged[j].x + (ux * push * 100) / CANVAS_MODEL.width,
                y: arranged[j].y + (uy * push * 100) / CANVAS_MODEL.height,
              });
              moved = true;
            }
          }
          if (!moved) break;
        }
        return arranged;
      }

      function findPlanetPosition(existingPlanets, size) {
        const margins = getPositionMargins(size);
        const candidates = [];
        for (let i = 0; i < 160; i += 1) {
          const angle = i * 2.3999632 + Math.random() * 0.32;
          const ring = Math.sqrt((i + 1) / 160);
          candidates.push({
            x: clamp(50 + Math.cos(angle) * ring * (49 - margins.x), margins.x, 100 - margins.x),
            y: clamp(52 + Math.sin(angle) * ring * (46 - margins.y), margins.y, 100 - margins.y),
            size
          });
        }

        let bestCandidate = candidates[0], bestScore = -Infinity;
        for (const candidate of candidates) {
          const nearestGap = existingPlanets.reduce((min, p) => Math.min(min, getCollisionGap(candidate, p, 28)), Infinity);
          const score = nearestGap - (Math.hypot(candidate.x - 50, candidate.y - 52) * 0.08);
          if (score > bestScore) { bestScore = score; bestCandidate = candidate; }
          if (nearestGap > 10) break;
        }
        return { x: bestCandidate.x, y: bestCandidate.y };
      }

      function normalizeBook(book, index) {
        const safePages = Math.max(1, Math.floor(Number(book.pages) || 1));
        const themeId = PLANET_THEMES.some(t => t.id === book.themeId) ? book.themeId : PLANET_THEMES[index % PLANET_THEMES.length].id;
        const theme = getThemeById(themeId);
        
        return {
          id: book.id ?? createBookId(),
          title: String(book.title ?? `책 ${index + 1}`),
          pages: safePages,
          rating: clamp(Math.round(Number(book.rating) || 5), 1, 5),
          review: String(book.review ?? ''),
          x: Number.isFinite(Number(book.x)) ? Number(book.x) : 50,
          y: Number.isFinite(Number(book.y)) ? Number(book.y) : 50,
          size: clamp(Number(book.size) || 70, 60, 150),
          themeId,
          hasRing: typeof book.hasRing === 'boolean' ? book.hasRing : theme.hasRing,
          tilt: clamp(Number(book.tilt) || ((index % 7) - 3) * 7, -28, 28),
        };
      }

      function PlanetVisual({ book, isSelected = false, compact = false }) {
        const theme = getThemeById(book.themeId);
        const displaySize = compact ? 56 : book.size;
        const [baseColor, detailColor, ringColor] = theme.colors;
        const strokeColor = '#334155';
        
        // ID 해시를 기반으로 랜덤한 표정 결정 (고유 유지)
        const faceType = book.id.charCodeAt(book.id.length - 1) % 3;
        
        let Face;
        if (faceType === 0) {
          // ^_^ 미소 짓는 얼굴
          Face = () => (
            <g className="face">
              <path d="M 32 55 Q 36 50 40 55" stroke={strokeColor} strokeWidth="3" fill="none" strokeLinecap="round" />
              <path d="M 60 55 Q 64 50 68 55" stroke={strokeColor} strokeWidth="3" fill="none" strokeLinecap="round" />
              <ellipse cx="28" cy="58" rx="5" ry="3" fill="#ffb8c6" opacity="0.9" />
              <ellipse cx="72" cy="58" rx="5" ry="3" fill="#ffb8c6" opacity="0.9" />
              <path d="M 45 58 Q 50 64 55 58" stroke={strokeColor} strokeWidth="2.5" fill="none" strokeLinecap="round" />
            </g>
          );
        } else if (faceType === 1) {
          // 동그란 눈에 윙크
          Face = () => (
            <g className="face">
              <circle cx="35" cy="53" r="3.5" fill={strokeColor} />
              <path d="M 62 55 Q 65 52 68 55" stroke={strokeColor} strokeWidth="3" fill="none" strokeLinecap="round" />
              <ellipse cx="25" cy="56" rx="5" ry="3" fill="#ffb8c6" opacity="0.9" />
              <ellipse cx="75" cy="56" rx="5" ry="3" fill="#ffb8c6" opacity="0.9" />
              <path d="M 47 57 Q 50 60 53 57" stroke={strokeColor} strokeWidth="2.5" fill="none" strokeLinecap="round" />
            </g>
          );
        } else {
          // • o • 호기심 많은 얼굴
          Face = () => (
            <g className="face">
              <circle cx="33" cy="53" r="4" fill={strokeColor} />
              <circle cx="67" cy="53" r="4" fill={strokeColor} />
              <ellipse cx="24" cy="56" rx="4" ry="2.5" fill="#ffb8c6" opacity="0.9" />
              <ellipse cx="76" cy="56" rx="4" ry="2.5" fill="#ffb8c6" opacity="0.9" />
              <circle cx="50" cy="58" r="3" fill="none" stroke={strokeColor} strokeWidth="2.5" />
            </g>
          );
        }

        return (
          <div className={`planet-character ${isSelected ? 'is-selected' : ''}`} style={{ width: displaySize, height: displaySize }}>
            <svg viewBox="-20 -20 140 140" width="100%" height="100%" className="overflow-visible" style={{ transform: `rotate(${book.tilt || 0}deg)` }}>
              {book.hasRing && <path d="M -5 50 A 55 18 0 0 1 105 50" fill="none" stroke={ringColor} strokeWidth="8" strokeLinecap="round" opacity="0.5" transform="rotate(-15 50 50)" />}
              
              {/* 매끈한 행성 배경 (무늬 없음) */}
              <circle cx="50" cy="50" r="45" fill={baseColor} stroke={strokeColor} strokeWidth="4" />
              
              <Face />
              <path d="M 22 35 A 25 25 0 0 1 42 16" fill="none" stroke="white" strokeWidth="5" strokeLinecap="round" opacity="0.6" />
              <circle cx="28" cy="20" r="2.5" fill="white" opacity="0.8" />
              
              {book.hasRing && <path d="M -5 50 A 55 18 0 0 0 105 50" fill="none" stroke={ringColor} strokeWidth="8" strokeLinecap="round" transform="rotate(-15 50 50)" />}
            </svg>
          </div>
        );
      }

      function App() {
        const [books, setBooks] = useState([]);
        const [isLoading, setIsLoading] = useState(true);
        const [isSaving, setIsSaving] = useState(false);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [selectedBookId, setSelectedBookId] = useState(null);
        const [newBook, setNewBook] = useState({ title: '', pages: '', rating: 5, review: '' });
        const [formError, setFormError] = useState('');
        
        const titleInputRef = useRef(null);

        useEffect(() => {
          const fetchBooks = async () => {
            if (!SCRIPT_URL) {
              // URL이 없으면 로컬 스토리지 데이터 불러오기 (임시)
              try {
                const saved = window.localStorage.getItem(STORAGE_KEY);
                if (saved) {
                  const parsed = JSON.parse(saved);
                  if (Array.isArray(parsed) && parsed.length) {
                    setBooks(spreadPlanets(parsed.map(normalizeBook)));
                  }
                }
              } catch (e) { console.error("로컬 데이터 로드 실패", e); }
              setIsLoading(false);
              return;
            }

            // 구글 앱스 스크립트에서 데이터 가져오기
            try {
              const res = await fetch(SCRIPT_URL);
              const data = await res.json();
              setBooks(spreadPlanets(data.map(normalizeBook)));
            } catch (error) {
              console.error("구글 시트 연동 실패:", error);
              alert("데이터를 불러오는데 실패했습니다. URL을 확인해주세요.");
            } finally {
              setIsLoading(false);
            }
          };

          fetchBooks();
        }, []);

        const totalLy = useMemo(() => books.reduce((sum, book) => sum + book.pages, 0), [books]);
        const currentIndex = RANKS.findIndex(r => totalLy >= r.minLy && totalLy <= r.maxLy) !== -1 
          ? RANKS.findIndex(r => totalLy >= r.minLy && totalLy <= r.maxLy) : RANKS.length - 1;
        
        const currentRank = RANKS[currentIndex];
        const prevRank = currentIndex > 0 ? RANKS[currentIndex - 1] : null;
        const nextRank = currentIndex < RANKS.length - 1 ? RANKS[currentIndex + 1] : null;
        const remainingLy = nextRank ? Math.max(0, nextRank.minLy - totalLy) : 0;
        const progressPercent = nextRank ? Math.min(100, Math.max(0, ((totalLy - currentRank.minLy) / (nextRank.minLy - currentRank.minLy)) * 100)) : 100;
        const selectedBook = books.find(b => b.id === selectedBookId) ?? books[books.length - 1] ?? null;

        const backgroundStars = useMemo(() => Array.from({ length: 40 }).map((_, i) => ({
          id: i, x: Math.random() * 100, y: Math.random() * 100, size: Math.random() * 3 + 1,
          opacity: Math.random() * 0.5 + 0.1, animDelay: `${Math.random() * 3}s`,
        })), []);

        const shootingStars = useMemo(() => Array.from({ length: 4 }).map((_, i) => ({
          id: i, top: Math.random() * 40, left: Math.random() * 60 + 40,
          delay: Math.random() * 15 + i * 2, duration: Math.random() * 1.5 + 2,
        })), []);

        const handleAddBook = async (event) => {
          event.preventDefault();
          const pages = Number(newBook.pages);
          if (!newBook.title.trim() || !Number.isFinite(pages) || pages < 1) {
            setFormError('책 제목과 1 이상의 페이지 수를 입력해 주세요.');
            return;
          }

          setIsSaving(true);
          const size = Math.max(60, Math.min(150, 40 + pages / 10));
          const theme = PLANET_THEMES[Math.floor(Math.random() * PLANET_THEMES.length)];
          const position = findPlanetPosition(books, size);
          
          const addedBook = {
            id: createBookId(), title: newBook.title.trim(), pages: Math.floor(pages),
            rating: newBook.rating, review: newBook.review.trim(),
            x: position.x, y: position.y, size, themeId: theme.id, 
            hasRing: theme.hasRing, tilt: Math.round(Math.random() * 52 - 26),
          };

          const newBooksList = spreadPlanets([...books, addedBook]);
          
          // 먼저 화면에 빠르게 업데이트 (Optimistic Update)
          setBooks(newBooksList);
          setSelectedBookId(addedBook.id);
          setNewBook({ title: '', pages: '', rating: 5, review: '' });
          setIsModalOpen(false);

          // 구글 스크립트로 저장
          if (SCRIPT_URL) {
            try {
              // CORS 사전 요청 방지를 위해 Content-Type을 text/plain으로 전송
              await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(addedBook)
              });
            } catch (error) {
              console.error('저장 실패:', error);
              setFormError('클라우드 저장에 실패했습니다.');
            }
          } else {
            // URL이 없으면 로컬에 임시 저장
            try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(newBooksList)); } catch {}
          }
          
          setIsSaving(false);
        };

        return (
          <div className="min-h-screen bg-slate-950 text-slate-300 font-cute selection:bg-indigo-500/30 pb-24 md:pb-12 overflow-x-hidden relative">
            <header className="border-b border-slate-800/60 bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
              <div className="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
                <div>
                  <h1 className="text-2xl sm:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400 mb-1 flex items-center gap-2">
                    <Icon name="rocket" size={28} className="text-indigo-400 shrink-0" />
                    나만의 독서 우주
                  </h1>
                  <p className="text-slate-400 text-sm">책을 읽고 귀여운 행성 친구들을 모아보세요!</p>
                </div>
                {SCRIPT_URL ? (
                  <div className="hidden sm:flex items-center gap-2 text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-full">
                    <Icon name="cloud" size={14} /> 구글 시트 연동 됨
                  </div>
                ) : (
                  <div className="hidden sm:flex items-center gap-2 text-xs bg-amber-500/10 text-amber-400 border border-amber-500/30 px-3 py-1.5 rounded-full">
                    <Icon name="cloud" size={14} /> 로컬 저장 모드
                  </div>
                )}
              </div>
            </header>

            <main>
              {/* 대시보드 */}
              <section className="max-w-4xl mx-auto px-4 sm:px-6 py-6 relative z-10">
                <div className="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-2xl sm:rounded-3xl p-4 sm:p-6 shadow-2xl flex flex-col items-center">
                  <h2 className="text-slate-300 text-lg mb-6 flex items-center gap-2">
                    <Icon name="sparkles" size={18} className="text-yellow-400" />
                    우주선 진화 과정
                    <Icon name="sparkles" size={18} className="text-yellow-400" />
                  </h2>

                  <div className="grid grid-cols-[72px_minmax(120px,1fr)_72px] sm:grid-cols-[96px_1fr_144px_1.5fr_96px] items-center justify-between w-full max-w-3xl gap-2 sm:gap-0">
                    <div className="flex flex-col items-center">
                      {prevRank ? (
                        <>
                          <div className="w-12 h-12 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center mb-2 opacity-50">
                            <Icon name={prevRank.icon} size={24} className="text-slate-500" />
                          </div>
                          <span className="text-xs text-slate-500 text-center leading-tight">{prevRank.title}</span>
                        </>
                      ) : <div className="w-12 h-12" />}
                    </div>

                    <div className="h-1 bg-slate-800 rounded-full relative hidden sm:block">
                      {prevRank && <div className="absolute inset-0 bg-indigo-500/30 rounded-full" />}
                    </div>

                    <div className="flex flex-col items-center relative group shrink-0">
                      <div className="absolute top-0 w-20 h-20 bg-indigo-500 rounded-full blur-xl opacity-40 animate-pulse" />
                      <div className="w-20 h-20 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center relative z-10 border-4 border-slate-900 shadow-xl group-hover:scale-105 transition-transform duration-300">
                        <Icon name={currentRank.icon} size={36} className="text-white drop-shadow-md" />
                      </div>
                      <div className="mt-3 text-center">
                        <span className="text-base sm:text-lg font-bold text-white block leading-tight">{currentRank.title}</span>
                        <span className="text-sm text-indigo-300 font-medium">{totalLy.toLocaleString()} 광년</span>
                      </div>
                    </div>

                    {nextRank ? (
                      <div className="col-span-3 sm:col-span-1 row-start-2 sm:row-start-auto mx-1 sm:mx-6 mt-5 sm:mt-0 flex flex-col justify-center relative min-w-[80px]">
                        <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700 shadow-inner">
                          <div className="h-full bg-gradient-to-r from-indigo-500 to-pink-500 progress-stripe transition-all duration-1000" style={{ width: `${progressPercent}%` }} />
                        </div>
                        <div className="mt-2 self-center bg-indigo-500/20 text-indigo-200 border border-indigo-500/30 px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap shadow-lg">
                          다음까지 {remainingLy.toLocaleString()} 광년!
                        </div>
                      </div>
                    ) : <div className="hidden sm:block" />}

                    <div className="flex flex-col items-center">
                      {nextRank ? (
                        <>
                          <div className="w-14 h-14 rounded-2xl bg-slate-800 border-2 border-dashed border-slate-600 flex items-center justify-center mb-2">
                            <Icon name={nextRank.icon} size={28} className="text-slate-500" />
                          </div>
                          <span className="text-xs text-slate-400 text-center leading-tight">{nextRank.title}</span>
                        </>
                      ) : (
                        <>
                          <div className="w-14 h-14 rounded-2xl bg-gradient-to-tr from-yellow-400 to-orange-500 flex items-center justify-center mb-2 shadow-[0_0_15px_rgba(250,204,21,0.5)]">
                            <Icon name="star" size={28} className="text-white animate-pulse" />
                          </div>
                          <span className="text-xs text-yellow-400 font-bold text-center leading-tight">최종 목표 달성!</span>
                        </>
                      )}
                    </div>
                  </div>
                </div>
              </section>

              {/* 우주 공간 */}
              <section className="max-w-5xl mx-auto px-4 sm:px-6 grid lg:grid-cols-[minmax(0,1fr)_280px] gap-4 sm:gap-6">
                <div className="relative w-full h-[440px] sm:h-[500px] bg-slate-900/50 border border-slate-800/80 rounded-2xl sm:rounded-3xl overflow-hidden shadow-2xl flex items-center justify-center">
                  
                  {isLoading ? (
                    <div className="flex flex-col items-center text-slate-400 gap-3">
                      <div className="spinner"></div>
                      <p>우주 데이터를 불러오는 중...</p>
                    </div>
                  ) : (
                    <>
                      {backgroundStars.map((star) => (
                        <div key={`star-${star.id}`} className="absolute rounded-full bg-white animate-pulse" style={{ left: `${star.x}%`, top: `${star.y}%`, width: `${star.size}px`, height: `${star.size}px`, opacity: star.opacity, animationDelay: star.animDelay, animationDuration: '3s' }} />
                      ))}
                      {shootingStars.map((star) => (
                        <div key={`shooting-${star.id}`} className="shooting-star" style={{ top: `${star.top}%`, left: `${star.left}%`, animation: `shootingStar ${star.duration}s linear infinite`, animationDelay: `${star.delay}s` }} />
                      ))}

                      {/* 궤도선 */}
                      {books.length > 1 && (
                        <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-25" viewBox="0 0 100 100" preserveAspectRatio="none">
                          {books.map((book, i) => {
                            if (i === 0) return null;
                            const prev = books[i - 1];
                            return (
                              <path key={`line-${book.id}`} d={`M ${prev.x} ${prev.y} Q ${(prev.x + book.x) / 2 + Math.sin(i * 1.7) * 7} ${(prev.y + book.y) / 2 + Math.cos(i * 1.3) * 6} ${book.x} ${book.y}`} fill="none" stroke="rgba(255, 255, 255, 0.4)" strokeWidth="0.35" strokeDasharray="1.5 1.4" />
                            );
                          })}
                        </svg>
                      )}

                      {/* 행성 렌더링 */}
                      {books.map((book, index) => {
                        const isSelected = selectedBook?.id === book.id;
                        return (
                          <div key={`book-${book.id}`} className="absolute animate-pop-in" style={{ left: `${book.x}%`, top: `${book.y}%`, zIndex: isSelected ? 20 : 10 }}>
                            <div className="planet-float" style={{ animationDelay: `${(index % 5) * 0.4}s` }}>
                              <button type="button" aria-pressed={isSelected} onClick={() => setSelectedBookId(book.id)} className="focus:outline-none rounded-full">
                                <PlanetVisual book={book} isSelected={isSelected} />
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </>
                  )}
                </div>

                {/* 사이드바 정보창 */}
                <aside className="bg-slate-900/70 border border-slate-800 rounded-2xl p-5 min-h-[220px] shadow-xl">
                  {selectedBook && !isLoading ? (
                    <div>
                      <div className="mb-4 flex justify-center">
                        <PlanetVisual book={selectedBook} isSelected compact />
                      </div>
                      <h2 className="text-white text-2xl font-bold leading-tight break-words text-center">{selectedBook.title}</h2>
                      <p className="text-sm text-indigo-300 mt-1 text-center">{selectedBook.pages.toLocaleString()} 광년 (페이지)</p>
                      <div className="flex justify-center mt-3 gap-1">
                        {[...Array(5)].map((_, i) => (
                          <Icon key={i} name="star" size={18} filled={i < selectedBook.rating} className={i < selectedBook.rating ? 'text-yellow-400' : 'text-slate-600'} />
                        ))}
                      </div>
                      {selectedBook.review ? (
                        <p className="mt-4 text-sm text-slate-300 bg-slate-950/60 border border-slate-800 p-3 rounded-xl leading-relaxed">
                          {selectedBook.review}
                        </p>
                      ) : (
                        <p className="mt-4 text-sm text-slate-500 text-center">아직 감상평이 없어요.</p>
                      )}
                    </div>
                  ) : (
                    <div className="h-full flex flex-col justify-center text-center text-slate-500">
                      <Icon name="book" size={32} className="mx-auto mb-3 text-slate-600" />
                      <p>행성을 선택하면 책 정보가 보여요.</p>
                    </div>
                  )}
                </aside>
              </section>
            </main>

            <button
              onClick={() => { setFormError(''); setIsModalOpen(true); setTimeout(() => titleInputRef.current?.focus(), 100); }}
              className="fixed bottom-8 right-8 bg-gradient-to-r from-indigo-500 to-pink-500 text-white p-5 rounded-full shadow-[0_0_20px_rgba(236,72,153,0.5)] hover:scale-110 transition-transform z-40"
            >
              <Icon name="plus" size={32} />
            </button>

            {isModalOpen && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4" onMouseDown={() => setIsModalOpen(false)}>
                <div className="bg-slate-900 border border-slate-700 w-full max-w-md rounded-2xl overflow-hidden shadow-2xl animate-pop-in" onMouseDown={e => e.stopPropagation()}>
                  <div className="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700">
                    <h2 className="text-xl font-bold text-white flex items-center gap-2">
                      <Icon name="book" size={24} className="text-pink-400" />
                      새로운 행성 친구 등록
                    </h2>
                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-white">
                      <Icon name="x" size={24} />
                    </button>
                  </div>
                  <form onSubmit={handleAddBook} className="p-6 space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">책 제목</label>
                      <input ref={titleInputRef} required type="text" value={newBook.title} onChange={e => setNewBook(b => ({ ...b, title: e.target.value }))} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none" placeholder="예: 어린 왕자" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">페이지 수 (광년)</label>
                      <input required type="number" min="1" value={newBook.pages} onChange={e => setNewBook(b => ({ ...b, pages: e.target.value }))} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none" placeholder="예: 250" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-2">별점</label>
                      <div className="flex gap-2">
                        {[1, 2, 3, 4, 5].map(star => (
                          <button key={star} type="button" onClick={() => setNewBook(b => ({ ...b, rating: star }))} className="hover:scale-110 transition-transform outline-none">
                            <Icon name="star" size={32} filled={star <= newBook.rating} className={star <= newBook.rating ? 'text-yellow-400' : 'text-slate-700'} />
                          </button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">한 줄 감상평</label>
                      <textarea value={newBook.review} onChange={e => setNewBook(b => ({ ...b, review: e.target.value }))} className="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:border-pink-500 focus:ring-1 focus:ring-pink-500 resize-none outline-none" rows="3" placeholder="이 책을 읽고 느낀 점을 적어보세요." />
                    </div>
                    {formError && <p className="text-sm text-rose-300 bg-rose-500/10 p-2 rounded-xl">{formError}</p>}
                    <button type="submit" disabled={!newBook.title || !newBook.pages || isSaving} className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-500 to-pink-500 text-white font-bold py-4 rounded-xl mt-4 hover:shadow-[0_0_20px_rgba(236,72,153,0.4)] disabled:opacity-50 transition-all">
                      {isSaving ? <div className="spinner !w-5 !h-5 !border-2 !border-white/20 !border-t-white"></div> : "행성 생성하기"}
                    </button>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
